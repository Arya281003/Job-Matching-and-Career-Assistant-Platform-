server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

nlp:
  service:
    base-url: http://localhost:8001

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/jobmatch_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USER:jobmatch}
    password: ${MYSQL_PASSWORD:jobmatchpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/jobmatch_db}

app:
  cors:
    allowed-origins: http://localhost:5173
  jobs:
    live:
      api-url: ${LIVE_JOBS_API_URL:https://remotive.com/api/remote-jobs}
      default-query: ${LIVE_JOBS_QUERY:software}
      import-limit: ${LIVE_JOBS_IMPORT_LIMIT:30}
      scheduled: ${LIVE_JOBS_SCHEDULED:false}
      refresh-ms: ${LIVE_JOBS_REFRESH_MS:21600000}
